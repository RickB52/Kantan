version: '3.9'

# BJT Master — Local Development Stack
# Chạy: docker compose up -d
# Dừng: docker compose down
# Reset DB: docker compose down -v

services:

  # ── PostgreSQL (thay RDS) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bjt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bjt_dev
      POSTGRES_USER: bjt_user
      POSTGRES_PASSWORD: bjt_local_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d   # auto-run migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjt_user -d bjt_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (thay ElastiCache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bjt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (thay AWS S3 — lưu audio, image) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: bjt_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: bjt_minio_user
      MINIO_ROOT_PASSWORD: bjt_minio_pass
    ports:
      - "9000:9000"   # API (dùng trong app thay S3 URL)
      - "9001:9001"   # Web console: http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO Setup (tạo bucket tự động khi start) ───────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: bjt_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 bjt_minio_user bjt_minio_pass;
      mc mb --ignore-existing local/bjt-audio;
      mc mb --ignore-existing local/bjt-images;
      mc anonymous set download local/bjt-images;
      echo 'MinIO buckets ready.';
      "

  # ── Mailhog (thay SES — xem email local) ─────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bjt_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (dùng trong app)
      - "8025:8025"   # Web UI: http://localhost:8025

  # ── pgAdmin (DB GUI — optional) ──────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bjt_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bjt.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"     # Web UI: http://localhost:5050
    depends_on:
      - postgres
    profiles:
      - tools           # chỉ chạy khi cần: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:
  minio_data:
